# 软件开发工作流定义
# 完整的需求 -> 实现 -> 审查 -> 交付流程

name: "software-development"
version: "1.0"
description: "从需求文档到代码实现的完整自动化流程"

# 最大循环次数（防止无限循环）
maxIterations: 10

# 阶段定义
stages:
  # ========== 阶段 1: 需求分析 ==========
  analyze:
    name: "需求分析与方案设计"
    agent: "claude"
    role: "architect"
    description: "分析需求文档，输出技术方案和任务拆解"

    input:
      - name: "requirement"
        source: "user"
        description: "用户需求描述"
      - name: "document"
        source: "user"
        optional: true
        description: "需求文档路径"
      - name: "projectContext"
        source: "auto"
        description: "项目上下文（自动扫描）"

    output:
      - name: "technicalSpec"
        description: "技术方案"
      - name: "implementationPlan"
        description: "实现计划"
      - name: "taskBreakdown"
        description: "任务拆解"

    transitions:
      - condition: "output.success"
        next: "review_plan"
      - condition: "output.needsMoreInfo"
        next: "clarify"

  # ========== 阶段 2: 方案评审 ==========
  review_plan:
    name: "方案可行性评审"
    agent: "codex"
    role: "reviewer"
    description: "评审技术方案的可行性和完整性"

    input:
      - name: "technicalSpec"
        source: "stage:analyze"
      - name: "implementationPlan"
        source: "stage:analyze"
      - name: "projectContext"
        source: "auto"

    output:
      - name: "reviewResult"
        description: "评审结果"
      - name: "suggestions"
        description: "改进建议"

    transitions:
      - condition: "output.verdict == 'approved'"
        next: "implement"
      - condition: "output.verdict == 'rejected'"
        next: "analyze"
        passData:
          feedback: "output.suggestions"
      - condition: "output.verdict == 'needs_revision'"
        next: "revise_plan"

  # ========== 阶段 3: 方案修订 ==========
  revise_plan:
    name: "方案修订"
    agent: "claude"
    role: "architect"
    description: "根据评审意见修订方案"

    input:
      - name: "technicalSpec"
        source: "stage:analyze"
      - name: "suggestions"
        source: "stage:review_plan"

    output:
      - name: "revisedSpec"

    transitions:
      - condition: "always"
        next: "review_plan"

  # ========== 阶段 4: 代码实现 ==========
  implement:
    name: "代码实现"
    agent: "deepseek"
    role: "coder"
    description: "根据方案实现代码"

    # 支持批量任务处理
    iterateOver: "taskBreakdown.tasks"

    input:
      - name: "task"
        source: "iteration"
      - name: "technicalSpec"
        source: "stage:analyze"
      - name: "projectContext"
        source: "auto"
      - name: "previousCode"
        source: "accumulator"
        optional: true

    output:
      - name: "codeChanges"
      - name: "implementationNotes"

    transitions:
      - condition: "output.success"
        next: "code_review"
      - condition: "output.blocked"
        next: "handle_blocker"

  # ========== 阶段 5: 代码审查 ==========
  code_review:
    name: "代码审查"
    agent: "codex"
    role: "code_reviewer"
    description: "审查代码质量"

    input:
      - name: "codeChanges"
        source: "stage:implement"
      - name: "technicalSpec"
        source: "stage:analyze"

    output:
      - name: "reviewResult"
      - name: "issues"

    transitions:
      - condition: "output.verdict == 'approved'"
        next: "style_check"
      - condition: "output.verdict == 'logic_issues'"
        next: "fix_logic"
      - condition: "output.verdict == 'style_issues'"
        next: "fix_style"
      - condition: "output.verdict == 'both'"
        next: "fix_logic"

  # ========== 阶段 6a: 逻辑修复 ==========
  fix_logic:
    name: "修复逻辑问题"
    agent: "deepseek"
    role: "coder"
    description: "修复代码审查中发现的逻辑问题"

    input:
      - name: "codeChanges"
        source: "stage:implement"
      - name: "logicIssues"
        source: "stage:code_review.issues.logicIssues"

    output:
      - name: "fixedCode"

    transitions:
      - condition: "always"
        next: "code_review"

  # ========== 阶段 6b: 样式修复 ==========
  fix_style:
    name: "修复样式问题"
    agent: "gemini"
    role: "stylist"
    description: "修复代码审查中发现的样式问题"

    input:
      - name: "codeChanges"
        source: "stage:implement"
      - name: "styleIssues"
        source: "stage:code_review.issues.styleIssues"

    output:
      - name: "styledCode"

    transitions:
      - condition: "always"
        next: "code_review"

  # ========== 阶段 7: 最终样式检查 ==========
  style_check:
    name: "代码风格优化"
    agent: "gemini"
    role: "stylist"
    description: "最终的代码风格检查和优化"

    input:
      - name: "codeChanges"
        source: "stage:implement"

    output:
      - name: "finalCode"
      - name: "styleReport"

    transitions:
      - condition: "always"
        next: "apply_changes"

  # ========== 阶段 8: 应用变更 ==========
  apply_changes:
    name: "应用代码变更"
    agent: "system"
    description: "将代码变更写入文件系统"

    input:
      - name: "finalCode"
        source: "stage:style_check"

    output:
      - name: "appliedFiles"

    transitions:
      - condition: "always"
        next: "complete"

  # ========== 阶段 9: 完成报告 ==========
  complete:
    name: "生成完成报告"
    agent: "claude"
    role: "summarizer"
    description: "总结整个实现过程，生成报告"

    input:
      - name: "allStageOutputs"
        source: "accumulator"

    output:
      - name: "summaryReport"

    transitions: []  # 终止

# 错误处理
errorHandling:
  maxRetries: 3
  onMaxRetries: "abort_with_report"

# 日志配置
logging:
  level: "info"
  saveToFile: true
  outputDir: ".ai-flow/logs"
